type Product @model @auth(rules: [{allow: public, provider: apiKey}])
{
  productBrand: String!
  productName: String!
  productVolume: String!
  productPrice: String!
  productPicture: String!
  color: String!
  featuring: AWSJSON
  productFeatures: AWSJSON!
}

type Order @model @auth(rules: [{allow: public, provider: apiKey}])
{
  orderNumber: String!
  status: String
  paymentMethod: String
  paymentStatus: String
  currency: String!
  totalCents: Int!
  email: AWSEmail!
  firstName: String
  lastName: String
  deliveryAddress: String
  invoiceAddress: String
  isCompany: Boolean
  companyName: String
  orderNotes: String
  items: AWSJSON!
}

type ContactMessage @model @auth(rules: [{allow: public, provider: apiKey}])
{
  name: String!
  email: AWSEmail!
  message: String!
  isResolved: Boolean!
}

type NewsletterSubscriber @model @auth(rules: [{allow: public, provider: apiKey}])
{
  email: AWSEmail!
  isActive: Boolean!
}